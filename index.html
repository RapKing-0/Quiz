<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Der zerbrochene Krug – Gerichtsakte</title>

<style>
    body {
        margin: 0;
        font-family: "Georgia", "Times New Roman", serif;
        background: radial-gradient(circle at top, #f3e7d3, #e6d3b1);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        color: #2b1d0e;
    }

    .quiz-container {
        width: 90%;
        max-width: 650px;
    }

    .card {
        background: rgba(255, 248, 232, 0.97);
        border: 2px solid #c2a97a;
        border-radius: 14px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(43, 29, 14, 0.25);
        position: relative;
        transition: opacity 0.3s ease;
    }

    .card::before {
        content: "";
        position: absolute;
        inset: 6px;
        border: 1px solid rgba(90, 60, 30, 0.2);
        border-radius: 10px;
        pointer-events: none;
    }

    h2 {
        margin-top: 0;
        font-weight: normal;
        font-size: 22px;
    }

    .progress-text {
        font-size: 14px;
        margin-bottom: 10px;
        color: #5a3c1e;
    }

    .progress {
        height: 8px;
        background: #e6d3b1;
        border-radius: 20px;
        margin-bottom: 20px;
        overflow: hidden;
        border: 1px solid #c2a97a;
    }

    .progress-bar {
        height: 100%;
        width: 0%;
        background: #6b4a2b;
        transition: 0.3s;
    }

    .answers button {
        width: 100%;
        margin: 8px 0;
        padding: 12px;
        border: 1px solid #b89b6a;
        background: #f7eddc;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
        font-family: inherit;
        font-size: 15px;
        color: #2b1d0e;
    }

    .answers button:hover {
        transform: scale(1.01);
        background: #efe0c6;
    }

    .correct {
        background: #d9f2d0 !important;
        border-color: #4a7a3f !important;
    }

    .wrong {
        background: #f6d0cc !important;
        border-color: #8b3a3a !important;
    }

    .feedback {
        margin-top: 10px;
        font-size: 14px;
        font-style: italic;
    }

    .next-btn {
        margin-top: 15px;
        padding: 12px;
        width: 100%;
        border: 1px solid #3a2412;
        border-radius: 10px;
        background: #3a2412;
        color: #f5e7d0;
        font-size: 16px;
        cursor: pointer;
        display: none;
        font-family: inherit;
    }

    .next-btn:hover {
        background: #2a170c;
    }

    .result {
        text-align: center;
    }

    .stamp {
        font-size: 28px;
        font-weight: bold;
        border: 2px solid #3a2412;
        display: inline-block;
        padding: 10px 20px;
        transform: rotate(-5deg);
        margin: 15px 0;
    }

    .restart {
        margin-top: 20px;
        padding: 12px;
        border: 1px solid #3a2412;
        border-radius: 10px;
        background: #3a2412;
        color: #f5e7d0;
        cursor: pointer;
        font-family: inherit;
    }

    .restart:hover {
        background: #2a170c;
    }
</style>
</head>

<body>

<div class="quiz-container">
    <div class="card" id="quiz">

        <div class="progress-text" id="progressText">Gerichtsakte 1 / 7</div>

        <div class="progress">
            <div class="progress-bar" id="progress"></div>
        </div>

        <h2 id="question"></h2>

        <div class="answers" id="answers"></div>

        <div class="feedback" id="feedback"></div>

        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Weiter</button>
    </div>
</div>

<script>
const questions = [
    {
        q: "Was für eine Position hat Marthe Rull im Prozess?",
        a: ["Klägerin", "Richterin", "Zeugin", "Angehörige"],
        correct: 0,
        explain: "Marthe Rull tritt als Klägerin im Prozess auf."
    },
    {
        q: "Was ergibt die Befragung aller Zeugen?",
        a: ["Die Wahrheit", "Eine Fährte, die verfolgt werden kann.", "Widersprüchliche Aussagen", "Keine Informationen"],
        correct: 2,
        explain: "Die Aussagen der Zeugen widersprechen sich deutlich."
    },
    {
        q: "Kann der von Ruprecht beschuldigte Lebrecht den Krug zerbrochen haben?",
        a: [
            "Ja, dieser rannte zur Tatzeit am Haus vorbei.",
            "Nein, da er zu dieser Zeit schlief.",
            "Nein, da er zu dieser Zeit nicht im Dorf ist.",
            "Ja, da ihn niemand gesehen hat."
        ],
        correct: 2,
        explain: "Lebrecht war zur Tatzeit nicht im Dorf."
    },
    {
        q: "Ruprecht schlug jemanden mit einer Türklinke, wer ist diese Person?",
        a: ["Lebrecht", "Eve Rull", "Marthe Rull", "Adam"],
        correct: 3,
        explain: "Adam ist die flüchtende Person."
    },
    {
        q: "Welche Aussagen welcher Personen decken sich?",
        a: ["Marthe und Eve Rull", "Ruprecht und Brigitte", "Adam und Eve Rull", "Brigitte und Marthe Rull"],
        correct: 1,
        explain: "Ruprecht und Brigitte geben übereinstimmende Aussagen."
    },
    {
        q: "Was lässt Adam auffliegen, dass er den Krug zerstört hat?",
        a: ["Perücke, Wunde, Krug", "Perücke, Wunde, Verhalten", "Verurteilung von Ruprecht", "Abweisung des Falles"],
        correct: 1,
        explain: "Mehrere Indizien (Perücke, Wunde und Verhalten) entlarven ihn."
    },
    {
        q: "Was ist die Erkenntnis dieser Geschichte?",
        a: [
            "Gerichtsprozesse führen zur Wahrheit",
            "Schuld kann nur durch eindeutige Beweise geklärt werden.",
            "Gerichte können aufgrund verschiedenster Gründe die Wahrheit verzerren.",
            "Aussagen vor Gericht nutzen nichts."
        ],
        correct: 2,
        explain: "Das Stück zeigt die Verzerrbarkeit von Wahrheit im Gerichtssystem."
    }
];

let current = 0;
let score = 0;
let answered = false;

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const nextBtn = document.getElementById("nextBtn");
const progress = document.getElementById("progress");
const feedback = document.getElementById("feedback");
const progressText = document.getElementById("progressText");

function loadQuestion() {
    answered = false;
    nextBtn.style.display = "none";
    feedback.textContent = "";

    let q = questions[current];
    questionEl.textContent = q.q;

    answersEl.innerHTML = "";

    progressText.textContent = `Gerichtsakte ${current + 1} / ${questions.length}`;
    progress.style.width = ((current) / questions.length) * 100 + "%";

    q.a.forEach((answer, index) => {
        const btn = document.createElement("button");
        btn.textContent = answer;
        btn.onclick = () => selectAnswer(btn, index);
        answersEl.appendChild(btn);
    });
}

function selectAnswer(button, index) {
    if (answered) return;
    answered = true;

    let q = questions[current];
    let buttons = answersEl.querySelectorAll("button");

    buttons.forEach((btn, i) => {
        btn.disabled = true;

        if (i === q.correct) btn.classList.add("correct");
        if (i === index && i !== q.correct) btn.classList.add("wrong");
    });

    if (index === q.correct) {
        score++;
        feedback.textContent = "✔ Richtig – " + q.explain;
    } else {
        feedback.textContent = "✖ Falsch – " + q.explain;
    }

    nextBtn.style.display = "block";
}

function nextQuestion() {
    current++;

    if (current < questions.length) {
        loadQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    let percent = Math.round((score / questions.length) * 100);

    let verdict = "";
    if (percent <= 30) verdict = "UNZUREICHENDE BEWEISLAGE";
    else if (percent <= 70) verdict = "TEILWEISE SCHULD / UNSICHER";
    else verdict = "KLARE ERKENNTNIS";

    document.getElementById("quiz").innerHTML = `
        <div class="result">
            <h2>Urteil des Gerichts</h2>
            <div class="stamp">${verdict}</div>
            <p>Ergebnis: <b>${score} / ${questions.length}</b></p>
            <p>Beweisstärke: <b>${percent}%</b></p>
            <button class="restart" onclick="location.reload()">Neue Verhandlung</button>
        </div>
    `;
}

loadQuestion();
</script>

</body>
</html>
